<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LivDex</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>LivDex</h1>
    <p>Meine Pokemon-TCG-Übersicht mit Sammelstand und Wunschkarten.</p>
  </header>

  <main>
    <section>
      <h2>Filter</h2>

      <label for="searchInput">Suche</label>
      <input id="searchInput" type="text" placeholder="Pokemon oder Kartenname">

      <label for="languageFilter">Sprache</label>
      <select id="languageFilter">
        <option value="">Alle</option>
      </select>

      <label for="ownedFilter">Besitz</label>
      <select id="ownedFilter">
        <option value="">Alle</option>
        <option value="owned">Nur vorhanden</option>
        <option value="missing">Nur fehlend</option>
      </select>
    </section>

    <section>
      <h2>Uebersicht</h2>
      <p>Gesamt: <span id="totalCount">0</span></p>
      <p>Vorhanden: <span id="ownedCount">0</span></p>
      <p>Wunschziel offen: <span id="targetOpenCount">0</span></p>
    </section>

    <section>
      <h2>Karten</h2>
      <div id="cardsContainer"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
