<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LivDex</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>LivDex</h1>
    <p>Meine Pokémon-TCG-Übersicht mit Sammelstand und Wunschkarten</p>
  </header>

  <main>
    <section>
      <h2>Filter</h2>

      <div class="view-buttons">
        <button id="showMissingButton" type="button">Fehlende Karten anzeigen</button>
        <button id="showAllButton" type="button">Alle Karten anzeigen</button>
        <button id="showGenerationButton" type="button">Eine Generation anzeigen</button>
        <button id="showBinderButton" type="button">Einen Ordner anzeigen</button>
      </div>

      <button id="toggleDisplayModeButton" type="button">Von Seitenweise zur Gesamtanzeige</button>

      <div class="search-controls">
        <label for="searchInput">Namenssuche</label>
        <input id="searchInput" type="text" placeholder="Pokemon oder Kartenname suchen">
      </div>

      <div id="generationControls">
        <label for="generationSelect">Generation</label>
        <select id="generationSelect">
          <option value="">Bitte waehlen</option>
          <option value="1">Generation 1</option>
          <option value="2">Generation 2</option>
          <option value="3">Generation 3</option>
          <option value="4">Generation 4</option>
          <option value="5">Generation 5</option>
          <option value="6">Generation 6</option>
          <option value="7">Generation 7</option>
          <option value="8">Generation 8</option>
          <option value="9">Generation 9</option>
        </select>
      </div>

      <div id="binderControls">
        <label for="binderSelect">Ordner</label>
        <select id="binderSelect">
          <option value="">Bitte waehlen</option>
          <option value="1">Ordner 1</option>
          <option value="2">Ordner 2</option>
          <option value="3">Ordner 3</option>
        </select>
      </div>
    </section>


    <section>
      <h2>Karten</h2>
      <p id="cardsStatus"></p>
      <div id="cardsContainer" class="cards-container"></div>
      <div class="pagination">
        <button id="previousButton" type="button">Zurück</button>
        <button id="nextButton" type="button">Weiter</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
