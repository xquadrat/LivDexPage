<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LivDex</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>LivDex</h1>
    <p>Meine Pokémon-TCG-Übersicht mit Sammelstand und Wunschkarten</p>
  </header>

  <main>
    <section>
      <h2>Filter</h2>
        <label for="viewType">Bereich</label>
        <select id="viewType">
          <option value="all">Gesamt</option>
          <option value="generation">Generation</option>
          <option value="binder">Ordner</option>
        </select>
        <label for="viewValue">Auswahl</label>
        <select id="viewValue">
          <option value="">Bitte waehlen</option>
        </select>
      </select>

      <button id="showMissingButton" type="button">Fehlende Karten anzeigen</button>
    </section>

    <section>
      <h2>Karten</h2>
      <p id="cardsStatus"></p>
      <div id="cardsContainer" class="cards-container"></div>
      <div class="pagination">
        <button id="previousButton" type="button">Zurück</button>
        <button id="nextButton" type="button">Weiter</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
